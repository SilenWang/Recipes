context:
  name: multica
  version: 1
  repo: multica-ai/multica
  # 对应的 Pixi 定义的平台
  platform: ${{ env.get("TARGET_PLATFORM", default="linux-64") }}
  # 对应包的名称
  architect: ${{ "linux-amd64" if platform == "linux-64" else "linux-arm64" }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
    url: https://github.com/${{ repo }}/releases/download/v${{ version }}/multica-cli-${{ version }}-${{ architect }}.tar.gz
    sha256: ...
    file_name: multica.tar.gz

build:
  number: 0
  script: |
    tar xvf multica.tar.gz
    mkdir -p $PREFIX/bin
    mv multica $PREFIX/bin/multica
    chmod 755 $PREFIX/bin/multica
    
  prefix_detection:
    ignore_binary_files: true
  dynamic_linking:
    binary_relocation: false

requirements:
  build:  
    - tar

tests:
  - script:
      - multica -h

about:
  homepage: https://github.com/multica-ai/multica
  license: Apache-2.0
  summary: 'The open-source managed agents platform.'
  description: |
    The open-source managed agents platform. Turn coding agents into real teammates - assign them issues, track progress, and compound reusable skills over time.
  repository: https://github.com/multica-ai/multica
